<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>论文展示页面</title>
<link rel="stylesheet" href="./static/css/bulma.min.css">
<style>
  body {
    font-family: Arial, sans-serif;
    line-height: 1.6;
    background-color: #f9f9f9;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
  }
  h1.title {
    text-align: center;
    margin-bottom: 0.5rem;
  }
  h2.subtitle {
    text-align: center;
    font-weight: normal;
    margin-bottom: 2rem;
  }
  .method-figure {
    display: flex;
    justify-content: center;
    margin-bottom: 2rem;
  }
  .method-figure img {
    max-width: 80%;
    height: auto;
    border: 1px solid #ccc;
    border-radius: 12px;
  }
  .abstract {
    background-color: #ffffff;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 2rem;
  }
  .effect-section {
    margin-bottom: 3rem;
  }
  .effect-section h3 {
    margin-bottom: 1rem;
  }
  .effect-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
  }
  .effect-cell {
    background-color: #fff;
    border: 1px solid #ccc;
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }
  .effect-cell img {
    max-width: 100%;
    height: auto;
    margin-bottom: 0.5rem;
    border-radius: 8px;
  }
  .effect-cell .text-box {
    background-color: #f7f7f7;
    border-radius: 8px;
    padding: 0.5rem;
    margin-bottom: 0.5rem;
  }
  .effect-cell audio {
    width: 100%;
    margin-bottom: 0.5rem;
  }
  .effect-header {
    display: flex;
    justify-content: space-between;
    font-weight: bold;
    margin-bottom: 1rem;
  }
</style>
</head>
<body>

<div class="container">

  <!-- 标题与作者 -->
  <h1 class="title">论文标题示例</h1>
  <h2 class="subtitle">作者A, 作者B, 作者C</h2>

  <!-- 方法图 -->
  <div class="method-figure">
    <img src="/mnt/data/0524e1ac-6b3e-4011-b224-e7c2eceb4343.png" alt="方法示意图">
  </div>

  <!-- 摘要 -->
  <div class="abstract">
    <strong>摘要：</strong>
    本文提出了一种新颖的方法用于复杂场景下的语音理解任务。通过多模态输入和特征增强技术，提高了模型在噪声环境下的鲁棒性。实验结果显示，本方法在不同数据集上均获得了显著提升。
  </div>

  <!-- 效果展示 -->
  <div class="effect-section">
    <div class="effect-header">
      <span>Source</span>
      <span>Target</span>
    </div>

    <!-- 三行两列效果展示 -->
    <div class="effect-grid">

      <!-- 第一组 -->
      <div class="effect-cell">
        <img src="./static/classical.jpg" alt="source image">
        <div class="text-box">classical</div>
        <audio controls>
          <source src="./static/classical.wav" type="audio/wav">
        </audio>
      </div>
      <div class="effect-cell">
        <img src="./static/classical_to_rock.wav" alt="target image">
        <div class="text-box">classical_to_rock</div>
        <audio controls>
          <source src="./static/classical_to_rock.wav" type="audio/wav">
        </audio>
      </div>

      <!-- 第二组 -->
      <div class="effect-cell">
        <img src="./static/metal.png" alt="source image">
        <div class="text-box">metal</div>
        <audio controls>
          <source src="./static/metal.wav" type="audio/wav">
        </audio>
      </div>
      <div class="effect-cell">
        <img src="./static/metal_to_new_age.wav" alt="target image">
        <div class="text-box">metal_to_new_age</div>
        <audio controls>
          <source src="./static/metal_to_new_age.wav" type="audio/wav">
        </audio>
      </div>

      <!-- 第三组 -->
      <div class="effect-cell">
        <img src="./static/pop.png" alt="source image">
        <div class="text-box">pop</div>
        <audio controls>
          <source src="./static/pop.wav" type="audio/wav">
        </audio>
      </div>
      <div class="effect-cell">
        <img src="./static/pop_to_traditional.wav" alt="target image">
        <div class="text-box">pop_to_traditional</div>
        <audio controls>
          <source src="./static/pop_to_traditional.wav" type="audio/wav">
        </audio>
      </div>

    </div>
  </div>

</div>

</body>
</html>
